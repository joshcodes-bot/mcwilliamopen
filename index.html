<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a4731">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>McWilliam Open</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1a4731;--g2:#205a3d;--g3:#2d7a52;--g4:#0f3320;
  --w:#ffffff;--of:#f7f5f0;--lg:#e8e3d8;--bd:#d9d4c9;
  --mu:#9b9588;--tx:#1c1c1c;--tl:#5a5650;--red:#d32f2f;
}
html,body{min-height:100%;width:100%;max-width:100%;background:#000;font-family:'Inter',sans-serif;color:var(--tx);overflow-x:hidden}
body{overflow-x:hidden;overflow-y:auto}

/* SPLASH */
#splash{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity 1.2s ease,visibility 1.2s ease}
#splash.out{opacity:0;visibility:hidden;pointer-events:none}
#slogo{width:185px;filter:brightness(0) invert(1);opacity:0;transform:scale(0.84) translateY(6px);transition:opacity 1.1s cubic-bezier(.22,1,.36,1),transform 1.1s cubic-bezier(.22,1,.36,1)}
#slogo.show{opacity:1;transform:scale(1) translateY(0)}
#sname{margin-top:26px;font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:400;letter-spacing:.55em;text-transform:uppercase;color:rgba(255,255,255,0.32);opacity:0;transition:opacity .9s ease .5s}
#sname.show{opacity:1}

/* APP */
#app{position:relative;min-height:100dvh;display:flex;flex-direction:column;opacity:0;transition:opacity .9s ease;background:var(--w)}
#app.show{opacity:1}

/* NAV */
nav{
  height:76px;
  background:var(--w);
  border-bottom:1px solid var(--bd);
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:0 28px;
  flex-shrink:0;
  z-index:10;
}

.nleft{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  min-width:0;
}

.nbrand{
  grid-column:2;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  cursor:pointer;
  justify-self:center;
}

.nbrand img{
  width:48px;
  flex-shrink:0;
  filter:brightness(0) saturate(100%) invert(22%) sepia(40%) saturate(600%) hue-rotate(110deg) brightness(85%);
}

.nbrand-t{
  font-family:'Cormorant Garamond',serif;
  font-size:25px;
  color:var(--g);
  font-style:italic;
  font-weight:700;
  line-height:1;
  white-space:nowrap;
}

.nlinks{
  display:flex;
  justify-content:flex-start;
  gap:2px;
}

.nbtn{
  height:76px;
  padding:0 18px;
  display:flex;
  align-items:center;
  font-size:12.5px;
  font-weight:600;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--tl);
  cursor:pointer;
  border:none;
  background:none;
  border-bottom:3px solid transparent;
  transition:color .15s,border-color .15s, background .15s;
}

.nbtn:hover{color:var(--g)}
.nbtn.active{color:var(--g);border-bottom-color:var(--g);background:linear-gradient(to bottom, transparent 92%, rgba(26,71,49,0.06) 100%)}

.nright{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:12px;
  min-width:0;
}

.nadmin-btn{
  font-size:11px;
  font-weight:600;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--mu);
  cursor:pointer;
  border:1px solid var(--bd);
  background:none;
  padding:8px 14px;
  transition:color .15s,border-color .15s, background .15s;
}

.nadmin-btn:hover{color:var(--g);border-color:var(--g);background:#f7fbf8}
.nadmin-btn.signed-in{color:var(--g);border-color:var(--g3)}
.nav-italic{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;
  font-style:italic;
  color:var(--mu);
  white-space:nowrap;
}

/* Hide hamburger + drawer on desktop */
.nhamburger{display:none}
.ndrawer{display:none}
.ndrawer-backdrop{display:none}

/* PAGES */
.page{display:none;flex:1;background:var(--w)}
.page.active{display:block}
.page::-webkit-scrollbar{width:3px}
.page::-webkit-scrollbar-thumb{background:var(--bd)}

/* LOADING STATE */
#dash-content,#rounds-content,#history-content{min-height:100%;display:flex;flex-direction:column}
#dash-content>.wrap,#rounds-content>.rw,#history-content>.hw{flex:1}
.loading{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DASHBOARD ── */
.wrap{max-width:1060px;margin:0 auto;padding:36px 32px 48px}
.top-row{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bd);border:1px solid var(--bd);margin-bottom:24px}
.champ-panel{background:#fcfdfb;padding:28px 32px;border-left:3px solid var(--g)}
.panel-eye{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--g3);font-weight:600;margin-bottom:14px}
.champ-name{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:500;color:var(--g);line-height:1.05;margin-bottom:4px}
.champ-sub{font-size:12px;color:var(--mu);letter-spacing:.03em;margin-bottom:18px}
.champ-stats{display:flex;gap:0;border-top:1px solid var(--lg);padding-top:16px;margin-top:2px}
.cstat{padding-right:24px}
.cstat+.cstat{padding-left:24px;border-left:1px solid var(--lg)}
.cstat-n{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:500;color:var(--g);line-height:1}
.cstat-l{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);margin-top:3px}
.countdown-panel{
  background:var(--of);
  padding:28px 32px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
.cdrow{
  display:flex;
  align-items:flex-end;
  justify-content:center;
  margin-top:12px;
}
.cdu{text-align:center;padding:0 20px}
.cdu:first-child{padding-left:0}
.cdu+.cdu{border-left:1px solid var(--bd)}
.cdn{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:500;line-height:1;color:var(--g)}
.cdl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mu);margin-top:5px}
.cd-date{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;
  font-style:italic;
  color:var(--mu);
  margin-top:14px;
  text-align:center;
}


.hero-strip{
  max-width:1060px;
  margin:0 auto 24px;
  background:var(--g);
  color:#fff;
  padding:10px 18px;
  text-align:center;
  border:1px solid var(--g4);
}

.hero-strip-text{
  font-size:11px;
  font-weight:600;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.94);
}

/* Season standings */
.sh{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--g);position:relative;display:inline-block;padding-bottom:6px}
.sec-title::after{content:'';position:absolute;left:0;bottom:0;width:36px;height:2px;background:var(--g3)}
.sec-link{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--g3);cursor:pointer;border:none;background:none}
.sec-link:hover{text-decoration:underline}
.season-row{border:1px solid var(--bd);margin-bottom:24px;background:var(--w)}
.season-inner{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd)}
.player-card{background:#fcfdfb;padding:20px 26px}
.pc-pos{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);margin-bottom:7px}
.pc-name{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:var(--g);margin-bottom:2px}
.pc-wins{font-size:12px;color:var(--tl)}
.pc-wins strong{font-weight:600;color:var(--tx)}
.pc-bar{height:2px;background:var(--lg);margin-top:12px}
.pc-bar-fill{height:2px;background:var(--g3);transition:width .6s ease}

/* Latest round */
.latest-card{border:1px solid var(--bd);background:#fcfdfb;margin-bottom:24px}
.lc-head{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--bd)}
.lc-course{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--g)}
.lc-meta{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--mu);margin-top:2px}
.lc-winner{display:flex;align-items:center;gap:8px;background:#eef7f1;border:1px solid #c8decd;padding:6px 14px;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--g);white-space:nowrap}
.lc-body{padding:20px 24px}

/* Round tiles */
.rtiles{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd)}
.rtile{background:var(--w);padding:20px 20px;cursor:pointer;transition:background .12s;position:relative;overflow:hidden}
.rtile:hover{background:var(--of)}
.rtile::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--g);transform:scaleX(0);transform-origin:left;transition:transform .2s}
.rtile:hover::after{transform:scaleX(1)}
.tdate{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--mu);margin-bottom:6px}
.tcourse{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--g);margin-bottom:12px;line-height:1.25}
.twin{display:flex;align-items:baseline;justify-content:space-between}
.twn{font-size:13px;font-weight:600;color:var(--tx)}
.tws{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--g)}
.tarr{position:absolute;top:18px;right:16px;font-size:12px;color:var(--bd);transition:color .15s}
.rtile:hover .tarr{color:var(--g3)}

/* ── ROUNDS PAGE ── */
.rw{max-width:980px;margin:0 auto;padding:40px 32px}
.yb{margin-bottom:44px}
.ydiv{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.yl{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--g);font-weight:600;white-space:nowrap}
.yline{flex:1;height:1px;background:var(--bd)}
.rc{border:1px solid var(--bd);background:#fcfdfb;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.rc:hover{border-color:#9aaa9f}
.rc.open{border-color:var(--g)}
.rch{display:grid;grid-template-columns:160px 1fr auto 28px;align-items:center;gap:18px;padding:15px 20px}
.rhd{font-size:13px;font-weight:600}
.rhs{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--mu);margin-top:1px}
.rhco{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--g)}
.rhw{display:flex;align-items:center;gap:7px;background:#eef7f1;border:1px solid #c8decd;padding:5px 12px;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;color:var(--g);white-space:nowrap}
.rhch{width:26px;height:26px;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;color:var(--mu);font-size:11px;transition:transform .25s;flex-shrink:0}
.rc.open .rhch{transform:rotate(180deg)}
.rcb{display:none;border-top:1px solid var(--bd);padding:22px 20px;animation:si .2s ease}
.rc.open .rcb{display:block}
@keyframes si{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* Scorecard */
.scw{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px;border:1px solid var(--lg);background:#fff}
.sc{width:100%;border-collapse:collapse;font-size:12.5px;min-width:820px;table-layout:fixed}
.sc thead tr.hr th{background:var(--g);color:#fff;padding:8px 5px;text-align:center;font-size:9.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.sc thead tr.hr th:first-child{text-align:left;padding-left:14px;min-width:116px;width:116px}
.sc thead tr.hr th.s2{background:var(--g4)}
.sc .pr td{background:#e8f0e8;font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--g4);padding:6px 5px;text-align:center;border:none;font-weight:600}
.sc .pr td:first-child{text-align:left;padding-left:14px}
.sc tbody td{padding:10px 5px;text-align:center;border-bottom:1px solid var(--lg);font-size:13px}
.sc tbody td:first-child{text-align:left;padding-left:14px;font-weight:600;white-space:nowrap}
.sc tbody tr:hover td{background:#fafaf7}
.sub{background:#eaf2ea!important;font-weight:700;color:var(--g4)}
.tot{background:#d5e8d5!important;font-weight:700;color:var(--g4);font-size:13.5px}
.wr td{background:#f3fbf5}
.bi{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--g3);color:var(--g);font-size:12px;font-weight:600}
.bsq{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border:1.5px solid var(--red);color:var(--red);font-size:12px;font-weight:600}
.db{color:#b71c1c;font-weight:700}
.dbq{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:22px;
  height:22px;
  position:relative;
  color:var(--red);
  font-size:12px;
  font-weight:400;
  line-height:1;
}

.dbq::before,
.dbq::after{
  content:'';
  position:absolute;
  inset:0;
  border:1.5px solid var(--red);
  pointer-events:none;
}

.dbq::after{
  inset:3px;
}
.scorecard-mobile{display:none}
.mobile-card{border:1px solid var(--lg);background:#fff;margin-bottom:12px}
.mobile-card:last-child{margin-bottom:0}
.mobile-card-title{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--of);border-bottom:1px solid var(--lg)}
.mobile-card-title span:first-child{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--g)}
.mobile-total{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--g3);font-weight:600}
.mobile-score-table{width:100%;border-collapse:collapse;table-layout:fixed}
.mobile-score-table th,.mobile-score-table td{border-bottom:1px solid var(--lg);padding:8px 3px;text-align:center}
.mobile-score-table thead th{background:var(--g);color:#fff;font-size:8px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.mobile-score-table thead th:first-child,.mobile-score-table tbody td:first-child{width:72px;text-align:left;padding-left:10px}
.mobile-score-table tbody td:first-child{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--g);white-space:nowrap}
.mobile-score-table .par-row td{background:#eef4ef;color:var(--g4);font-size:10px;font-weight:600;text-transform:uppercase}
.mobile-score-table .sum-cell{background:#eaf2ea;font-weight:700;color:var(--g4)}
.mobile-score-table .total-cell{background:#d5e8d5;font-weight:700;color:var(--g4);font-size:12px}
.mobile-score-table .winner-row td{background:#f3fbf5}
.mobile-score-table tbody tr:last-child td{border-bottom:none}
.rev{border-left:3px solid var(--g);padding:16px 20px;background:#f5fbf7;font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;line-height:1.8;color:var(--tx)}
.revl{font-family:'Inter',sans-serif;font-style:normal;font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--g3);font-weight:600;margin-bottom:8px}

/* ── HISTORY ── */
.hw{max-width:900px;margin:0 auto;padding:40px 32px}
.ph{font-family:'Cormorant Garamond',serif;font-size:38px;font-style:italic;color:var(--g);margin-bottom:4px}
.ps{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mu);margin-bottom:32px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);margin-bottom:36px}
.sb{background:#fcfdfb;padding:20px 18px}
.sbn{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:500;color:var(--g);line-height:1}
.sbl{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--mu);margin-top:5px}
.ht{width:100%;border-collapse:collapse;margin-bottom:44px}
.ht th{background:var(--g);color:#fff;text-align:left;padding:10px 16px;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:600}
.ht td{padding:14px 16px;border-bottom:1px solid var(--lg);font-size:14px}
.ht tr:hover td{background:var(--of)}
.hty{font-size:11px;letter-spacing:.07em;color:var(--mu)}
.htn{font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic}
.hts{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--g)}
.htb{display:inline-block;background:#eef7f1;border:1px solid #c8decd;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;color:var(--g);font-weight:600}
.tg{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd)}
.tc{background:#fcfdfb;padding:30px 20px;text-align:center}
.tcn{font-family:'Cormorant Garamond',serif;font-size:60px;font-weight:500;color:var(--g);line-height:1}
.tcna{font-size:15px;font-weight:600;margin-top:10px}
.tcy{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-top:4px}
.tc.dim .tcn{color:#c0bbb3}

/* FOOTER */
footer{background:var(--g);padding:24px 32px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.08)}
.fi{max-width:1060px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.fb{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:rgba(255,255,255,.45)}
.fy{font-size:11px;color:rgba(255,255,255,.25);letter-spacing:.05em}

/* ── MODAL / OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s}
.overlay.open{opacity:1;visibility:visible}
.modal{background:#fff;border:1px solid var(--bd);width:92vw;max-width:960px;max-height:92vh;overflow-y:auto;transform:translateY(10px);transition:transform .25s;display:flex;flex-direction:column}
.overlay.open .modal{transform:translateY(0)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:#fff;z-index:1;flex-shrink:0}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--g)}
.modal-sub{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--mu);margin-top:2px}
.modal-close{background:none;border:1px solid var(--bd);color:var(--mu);cursor:pointer;width:30px;height:30px;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .15s,color .15s}
.modal-close:hover{border-color:var(--tx);color:var(--tx)}
.modal-body{padding:24px;flex:1}

/* ── ADD ROUND FORM ── */
.form-section{margin-bottom:28px}
.form-section-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--g);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--lg)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:6px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--tl);font-weight:600}
.form-input{border:1px solid var(--bd);padding:8px 12px;font-size:14px;font-family:'Inter',sans-serif;color:var(--tx);background:var(--w);transition:border-color .15s;width:100%}
.form-input:focus{outline:none;border-color:var(--g)}
.form-input.hole-input{padding:7px 5px;text-align:center;font-size:13px}
.form-select{border:1px solid var(--bd);padding:8px 12px;font-size:14px;font-family:'Inter',sans-serif;color:var(--tx);background:var(--w);width:100%;cursor:pointer}
.form-select:focus{outline:none;border-color:var(--g)}
.form-textarea{border:1px solid var(--bd);padding:10px 12px;font-size:14px;font-family:'Inter',sans-serif;color:var(--tx);background:var(--w);width:100%;min-height:80px;resize:vertical}
.form-textarea:focus{outline:none;border-color:var(--g)}
.player-block{background:var(--of);border:1px solid var(--bd);padding:16px;margin-bottom:12px}
.player-block-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--g);margin-bottom:12px;font-weight:500}
.hole-grid{display:grid;grid-template-columns:repeat(9,1fr) 40px repeat(9,1fr) 40px 50px;gap:4px;align-items:center}
.hole-label{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--mu);text-align:center;margin-bottom:4px}
.sub-cell{background:#eaf2ea;border:1px solid #c3dece;font-size:12px;font-weight:700;color:var(--g4);text-align:center;padding:7px 2px;min-width:0}
.tot-cell{background:#d5e8d5;border:1px solid #a8d5b5;font-size:13px;font-weight:700;color:var(--g4);text-align:center;padding:7px 2px;min-width:0}
.form-submit{background:var(--g);color:#fff;border:none;padding:12px 32px;font-size:13px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s;margin-top:8px}
.form-submit:hover{background:var(--g2)}
.form-submit:disabled{background:var(--mu);cursor:not-allowed}
.form-error{color:var(--red);font-size:13px;margin-top:8px}
.form-success{color:var(--g);font-size:13px;margin-top:8px;font-style:italic;font-family:'Cormorant Garamond',serif}

/* Login form */
.login-form{padding:40px;max-width:400px;margin:0 auto}
.login-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-style:italic;color:var(--g);margin-bottom:6px}
.login-sub{font-size:12px;color:var(--mu);margin-bottom:28px;letter-spacing:.03em}

/* Hole totals label row */
.hole-labels-row{display:grid;grid-template-columns:repeat(9,1fr) 40px repeat(9,1fr) 40px 50px;gap:4px;margin-bottom:4px}
.hl{font-size:9px;text-align:center;color:var(--mu);letter-spacing:.04em}
.hl.sub{background:none!important;font-size:9px;color:var(--g4)}
.hl.tot2{background:none!important;font-size:9px;color:var(--g4)}


/* flatter refinement */
.hero-strip,.latest-card,.season-row,.rc,.mobile-card,.sb,.tc,.player-card,.champ-panel,.countdown-panel,.rtile{
  box-shadow:none;
}
.latest-card,.season-row,.rc,.mobile-card,.sb,.tc,.player-card,.champ-panel,.countdown-panel,.rtile,
.analysis-hero,.analysis-stat,.analysis-card,.summary-player,.pb-item,.mini-row,.handicap-strip,.hcp-item{
  border-radius:2px;
}
.top-row,.rtiles,.season-inner,.sg,.tg{background:transparent;border:none;gap:12px}
.champ-panel,.countdown-panel,.player-card,.sb,.tc,.rtile{border:1px solid var(--bd)}
.rcb{border-top:1px solid var(--bd)}
.hero-strip{border-radius:2px}

/* ── ANALYSIS ── */
@keyframes analysisRise{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.aw{max-width:1160px;margin:0 auto;padding:34px 32px 48px}
.analysis-hero,.handicap-strip,.analysis-grid,.analysis-card,.summary-player,.chart-card{animation:analysisRise .42s ease both}
.analysis-hero{border:1px solid var(--bd);background:#fcfdfb;padding:22px 24px;margin-bottom:16px}
.analysis-top{display:flex;align-items:end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.analysis-title{font-family:'Cormorant Garamond',serif;font-size:38px;font-style:italic;color:var(--g);line-height:1}
.analysis-sub{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);margin-top:6px}
.analysis-controls{display:flex;align-items:end;gap:12px;flex-wrap:wrap}
.analysis-select-wrap{min-width:220px}
.analysis-select{height:44px;border:1px solid var(--bd);background:#fff;padding:0 14px;font-size:14px;font-family:'Inter',sans-serif;color:var(--tx);min-width:220px}
.analysis-select:focus{outline:none;border-color:var(--g)}
.analysis-note{margin-top:14px;padding-top:14px;border-top:1px solid var(--lg);font-size:13px;color:var(--tl);line-height:1.45}
.handicap-strip{display:grid;grid-template-columns:220px repeat(3,1fr);gap:1px;background:var(--g4);border:1px solid var(--g4);margin-bottom:16px}
.hcp-label,.hcp-item{background:var(--g);color:#fff;padding:16px 18px}
.hcp-label-k{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.72);font-weight:600;margin-bottom:8px}
.hcp-label-v{font-family:'Cormorant Garamond',serif;font-size:28px;line-height:1}
.hcp-item-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.hcp-name{font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:rgba(255,255,255,.88)}
.hcp-value{font-family:'Cormorant Garamond',serif;font-size:34px;line-height:1;color:#fff}
.hcp-sub{font-size:12px;color:rgba(255,255,255,.72);margin-top:6px}
.analysis-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.analysis-stat{border:1px solid var(--bd);background:#fcfdfb;padding:17px 18px}
.analysis-stat.highlight{background:#eef7f1;border-color:#c8decd}
.analysis-stat-k{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--mu);font-weight:600;margin-bottom:12px}
.analysis-stat-v{font-family:'Cormorant Garamond',serif;font-size:31px;color:var(--g);line-height:1.04}
.analysis-stat-s{font-size:13px;color:var(--tl);margin-top:8px;line-height:1.4}
.analysis-card{border:1px solid var(--bd);background:#fcfdfb;padding:20px}
.analysis-card+.analysis-card{margin-top:16px}
.analysis-card-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-style:italic;color:var(--g);margin-bottom:4px}
.analysis-card-sub{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);margin-bottom:14px}
.summary-board{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.summary-player{border:1px solid var(--bd);background:#fff;padding:18px}
.summary-player.current{border-color:var(--g)}
.summary-name{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--g);line-height:1;margin-bottom:12px}
.summary-line{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-top:1px solid var(--lg);font-size:13px}
.summary-line:first-of-type{border-top:none;padding-top:0}
.summary-line-label{color:var(--mu);text-transform:uppercase;letter-spacing:.08em;font-size:10px;font-weight:600}
.summary-line-value{color:var(--tx);font-weight:600}
.summary-line-value.good{color:var(--g)}
.chart-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-top:16px}
.chart-card{border:1px solid var(--bd);background:#fcfdfb;padding:20px}
.chart-head{display:flex;align-items:end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.chart-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-style:italic;color:var(--g)}
.chart-sub{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);margin-top:4px}
.chart-wrap{border:1px solid var(--lg);background:#fff;padding:10px}
.chart-wrap svg{display:block;width:100%;height:auto}
.chart-note{font-size:12px;color:var(--tl);margin-top:10px;line-height:1.5}
.chart-key{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px}
.chart-key-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--tl)}
.chart-key-swatch{width:14px;height:2px;background:var(--g);display:inline-block}
.chart-key-item:nth-child(2) .chart-key-swatch{background:var(--g3)}
.chart-key-item:nth-child(3) .chart-key-swatch{background:#8ea99a}
@media (max-width: 768px){
  .aw{padding:18px 14px 26px}
  .analysis-title{font-size:30px}
  .analysis-hero,.analysis-card,.analysis-stat,.chart-card{padding:18px}
  .analysis-grid,.summary-board,.chart-grid,.handicap-strip{grid-template-columns:1fr}
  .analysis-select{width:100%;min-width:0}
  .analysis-select-wrap{width:100%}
}

<body>

<div id="splash">
  <img id="slogo" src="images/mclogo2.png" alt="McWilliam Open">
  <div id="sname">McWilliam Open</div>
</div>

<div id="app">
  <nav>
    <div class="nleft">
      <!-- Hamburger (mobile only) -->
      <button class="nhamburger" id="hamburger-btn" onclick="toggleDrawer()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <!-- Inline nav links (desktop only) -->
      <div class="nlinks">
        <button class="nbtn active" onclick="showPage('dashboard')">Home</button>
        <button class="nbtn" onclick="showPage('rounds')">Rounds</button>
        <button class="nbtn" onclick="showPage('history')">Records</button>
        <button class="nbtn" onclick="showPage('analysis')">Analysis</button>

    </div>

    <div class="nbrand" onclick="showPage('dashboard')">
      <img src="images/mclogo2.png" alt="">
      <span class="nbrand-t">McWilliam Open</span>
    </div>

    <div class="nright">
      <span class="nav-italic">A tradition unlike any other</span>
      <button class="nadmin-btn" id="admin-btn" onclick="openAdminPanel()">Admin</button>
    </div>
  </nav>

  <!-- Side drawer (mobile only) -->
  <div class="ndrawer-backdrop" id="drawer-backdrop" onclick="toggleDrawer()"></div>
  <aside class="ndrawer" id="drawer">
    <button class="nbtn active" onclick="showPage('dashboard'); toggleDrawer()">Home</button>
    <button class="nbtn" onclick="showPage('rounds'); toggleDrawer()">Rounds</button>
    <button class="nbtn" onclick="showPage('history'); toggleDrawer()">Records</button>
    <button class="nbtn" onclick="showPage('analysis'); toggleDrawer()">Analysis</button>
  </aside>

  <!-- DASHBOARD -->
  <div id="page-dashboard" class="page active">
    <div id="dash-content"></div>
  </div>

  <!-- ROUNDS -->
  <div id="page-rounds" class="page">
    <div id="rounds-content"></div>
  </div>

  <!-- HISTORY -->
  <div id="page-history" class="page">
    <div id="history-content"></div>
  </div>

  <!-- ANALYSIS -->
  <div id="page-analysis" class="page">
    <div id="analysis-content"></div>
  </div>
</div>

<!-- ADMIN OVERLAY -->
<div class="overlay" id="admin-overlay" onclick="overlayClick(event,'admin-overlay')">

    <div class="modal-head">
      <div>
        <div class="modal-title">Admin</div>
        <div class="modal-sub">Sign in to manage rounds</div>
      </div>
      <button class="modal-close" onclick="closeOverlay('admin-overlay')">&#10005;</button>
    </div>

<script>
const SUPABASE_URL = 'https://qcwsoyqovrrxkyqwhtnk.supabase.co';

const HOLES = Array.from({length:18},(_,i)=>i+1);

// Cache

// ── DATA LOADING ──
async function loadData() {
  const [r1, r2, r3] = await Promise.all([
    sb.from('rounds').select('*').order('date', { ascending: false }),
    sb.from('scores').select('*'),
    sb.from('course_pars').select('*')
  ]);

  allScores = r2.data || [];

}

// ── HELPERS ──
function getPar(course) {
  const p = allPars[course];
  if (!p) return PAR_DEFAULT;
  return HOLES.map(h => p['h'+h] || 4);
}

function getScoresForRound(roundId) {
  return allScores.filter(s => s.round_id === roundId);
}

function calcOut(scores, h) { return scores.slice(0,9).reduce((a,v)=>a+(v||0),0); }
function calcIn(scores)  { return scores.slice(9).reduce((a,v)=>a+(v||0),0); }
function sumHoles(scores){ return scores.reduce((a,v)=>a+(v||0),0); }

function holeScores(score) {
  return HOLES.map(h => score['h'+h]);
}

function playedHoleCount(holeValues) {
  return holeValues.filter(v => v != null).length;
}

function playedParTotal(holeValues, parValues) {
  return holeValues.reduce((sum, v, i) => sum + (v != null ? parValues[i] : 0), 0);
}

function getWinner(roundId) {
  const scores = getScoresForRound(roundId);
  if (!scores.length) return null;

  const minTotal = Math.min(...scores.map(s => s.total));
  const leaders = scores.filter(s => s.total === minTotal);

  if (leaders.length !== 1) return null; // tie = no winner

  return leaders[0];
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-NZ', { day:'numeric', month:'long', year:'numeric' });
}

function formatDateShort(d) {
  return new Date(d).toLocaleDateString('en-NZ', { day:'numeric', month:'short', year:'numeric' });
}

function toPar(total, par) {
  const diff = total - par;
  if (diff === 0) return 'E';
  return diff > 0 ? '+'+diff : ''+diff;
}

function scoreCellHtml(stroke, par) {
  if (stroke == null) return '<td>—</td>';
  const diff = stroke - par;
  if (diff <= -2) return `<td><span class="bi" style="background:#c8e6c9;border-color:var(--g)">${stroke}</span></td>`;
  if (diff === -1) return `<td><span class="bi">${stroke}</span></td>`;
  if (diff === 1)  return `<td><span class="bsq">${stroke}</span></td>`;
  if (diff >= 2)   return `<td><span class="dbq">${stroke}</span></td>`;
  return `<td>${stroke}</td>`;
}

function buildScorecard(roundId, course) {
  const par = getPar(course);
  const scores = getScoresForRound(roundId);
  const winner = getWinner(roundId);
  const fullParTotal = sumHoles(par);
  const fullParOut = par.slice(0, 9).reduce((a, v) => a + v, 0);
  const fullParIn = par.slice(9).reduce((a, v) => a + v, 0);

  let desktop = `<div class="scorecard-desktop"><div class="scw"><table class="sc"><thead>
    <tr class="hr">
      <th></th>
      ${HOLES.slice(0, 9).map(h => `<th>${h}</th>`).join('')}
      <th class="s2">Out</th>
      ${HOLES.slice(9).map(h => `<th>${h}</th>`).join('')}
      <th class="s2">In</th>
      <th class="s2">Total</th>
    </tr>
    <tr class="pr">
      <td>Par</td>
      ${par.slice(0, 9).map(p => `<td>${p}</td>`).join('')}
      <td>${fullParOut}</td>
      ${par.slice(9).map(p => `<td>${p}</td>`).join('')}
      <td>${fullParIn}</td>
      <td>${fullParTotal}</td>
    </tr>
  </thead><tbody>`;

  PLAYERS.forEach(player => {
    const s = scores.find(x => x.player === player);
    if (!s) return;

    const hs = holeScores(s);
    const frontHs = hs.slice(0, 9);
    const backHs = hs.slice(9);

    const out = frontHs.reduce((a, v) => a + (v || 0), 0);
    const inp = backHs.reduce((a, v) => a + (v || 0), 0);
    const tot = s.total;
    const totalParPlayed = playedParTotal(hs, par);
    const isWin = winner && s.player === winner.player;

    desktop += `<tr class="${isWin ? 'wr' : ''}">
      <td>${player}${isWin ? ' 🏆' : ''}</td>
      ${frontHs.map((v, i) => scoreCellHtml(v, par[i])).join('')}
      <td class="sub">${out}</td>
      ${backHs.map((v, i) => scoreCellHtml(v, par[i + 9])).join('')}
      <td class="sub">${inp}</td>
      <td class="tot">${tot} (${toPar(tot, totalParPlayed)})</td>
    </tr>`;
  });

  desktop += `</tbody></table></div></div>`;

  function mobileSection(start, end, label, summaryLabel) {
    const holes = HOLES.slice(start, end);
    const holePars = par.slice(start, end);

    return `<div class="mobile-card">
      <div class="mobile-card-title">
        <span>${label}</span>
        <span class="mobile-total">${summaryLabel}</span>
      </div>
      <table class="mobile-score-table">
        <thead>
          <tr>
            <th></th>
            ${holes.map(h => `<th>${h}</th>`).join('')}
            <th>${start === 0 ? 'Out' : 'In'}</th>
            ${start === 9 ? '<th>Total</th>' : ''}
          </tr>
        </thead>
        <tbody>
          <tr class="par-row">
            <td>Par</td>
            ${holePars.map(p => `<td>${p}</td>`).join('')}
            <td class="sum-cell">${start === 0 ? fullParOut : fullParIn}</td>
            ${start === 9 ? `<td class="total-cell">${fullParTotal}</td>` : ''}
          </tr>
          ${PLAYERS.map(player => {
            const s = scores.find(x => x.player === player);
            if (!s) return '';

            const hs = holeScores(s);
            const segment = hs.slice(start, end);
            const segmentTotal = segment.reduce((a, v) => a + (v || 0), 0);
            const totalParPlayed = playedParTotal(hs, par);
            const isWin = winner && s.player === winner.player;

            return `<tr class="${isWin ? 'winner-row' : ''}">
              <td>${player}${isWin ? ' 🏆' : ''}</td>
              ${segment.map((v, i) => {
                const content = scoreCellHtml(v, holePars[i]).replace('<td>', '').replace('</td>', '');
                return `<td>${content}</td>`;
              }).join('')}
              <td class="sum-cell">${segmentTotal}</td>
              ${start === 9 ? `<td class="total-cell">${s.total} (${toPar(s.total, totalParPlayed)})</td>` : ''}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  }

  const mobile = `
    <div class="scorecard-mobile">
      ${mobileSection(0, 9, 'Front 9', `${fullParOut} par`)}
      ${mobileSection(9, 18, 'Back 9', `${fullParIn} par · ${fullParTotal} total`)}
    </div>
  `;

  return desktop + mobile;
}



function normalizeCourseName(course) {
  return (course || '').trim().toLowerCase();
}

function roundForScore(score) {
  return allRounds.find(r => r.id === score.round_id) || null;
}

function getPlayerScores(player) {
  return allScores.filter(s => s.player === player);
}

function average(nums) {
  return nums.length ? nums.reduce((a,b)=>a+b,0) / nums.length : null;
}

function formatAvg(n, digits = 1) {
  return n == null ? '—' : Number(n).toFixed(digits);
}

function formatScoreWithPar(total, par) {
  if (total == null || par == null) return '—';
  return `${total} (${toPar(total, par)})`;
}

function getPlayerWins(player) {
  return allRounds.reduce((sum, r) => {
    const w = getWinner(r.id);
    return sum + (w && w.player === player ? 1 : 0);
  }, 0);
}

function getPlayerAnalysis(player) {
  const scores = getPlayerScores(player);
  const roundsPlayed = scores.length;
  const holeStats = HOLES.map(hole => {
    const values = scores.map(s => s['h'+hole]).filter(v => v != null);
    return {
      hole,
      rounds: values.length,
      avg: average(values),
      best: values.length ? Math.min(...values) : null,
      worst: values.length ? Math.max(...values) : null,
      birdiesOrBetter: scores.filter(s => {
        const round = roundForScore(s);
        const par = getPar(round?.course || '');
        const val = s['h'+hole];
        return val != null && val <= par[hole-1] - 1;
      }).length,
      pars: scores.filter(s => {
        const round = roundForScore(s);
        const par = getPar(round?.course || '');
        const val = s['h'+hole];
        return val != null && val === par[hole-1];
      }).length,
      bogeyPlus: scores.filter(s => {
        const round = roundForScore(s);
        const par = getPar(round?.course || '');
        const val = s['h'+hole];
        return val != null && val >= par[hole-1] + 1;
      }).length,
    };
  });

  const playerRounds = scores.map(s => {
    const round = roundForScore(s);
    if (!round) return null;
    const course = round.course || '';
    const par = getPar(course);
    const hs = holeScores(s);
    const parPlayed = playedParTotal(hs, par);
    return {
      score: s,
      round,
      course,
      par,
      total: s.total,
      front: calcOut(hs),
      back: calcIn(hs),
      parPlayed,
      toPar: parPlayed ? toPar(s.total, parPlayed) : '—'
    };
  }).filter(Boolean);

  const totals = playerRounds.map(x => x.total).filter(v => v != null);
  const frontTotals = playerRounds.map(x => x.front).filter(v => v > 0);
  const backTotals = playerRounds.map(x => x.back).filter(v => v > 0);
  const toParValues = playerRounds.map(x => x.total - x.parPlayed).filter(v => Number.isFinite(v));

  const bestRound = playerRounds.reduce((best, x) => (!best || x.total < best.total) ? x : best, null);
  const bestFront = playerRounds.filter(x => x.front > 0).reduce((best, x) => (!best || x.front < best.front) ? x : best, null);
  const bestBack = playerRounds.filter(x => x.back > 0).reduce((best, x) => (!best || x.back < best.back) ? x : best, null);
  const morrinsvilleRounds = playerRounds.filter(x => normalizeCourseName(x.course).includes('morrinsville'));
  const bestMorrinsvilleBack = morrinsvilleRounds.filter(x => x.back > 0).reduce((best, x) => (!best || x.back < best.back) ? x : best, null);

  const worstSingleHole = scores.reduce((best, s) => {
    HOLES.forEach(h => {
      const val = s['h'+h];
      if (val == null) return;
      if (!best || val > best.score) {
        const round = roundForScore(s);
        best = { score: val, hole: h, course: round?.course || '—', date: round?.date || null };
      }
    });
    return best;
  }, null);

  return {
    player,
    roundsPlayed,
    wins: getPlayerWins(player),
    avgTotal: average(totals),
    avgFront: average(frontTotals),
    avgBack: average(backTotals),
    avgToPar: average(toParValues),
    handicapEstimate: Math.max(0, average(toParValues) ?? 0),
    bestRound,
    bestFront,
    bestBack,
    worstSingleHole,
    holeStats,
    bestMorrinsvilleBack
  };
}

function getOverallRecords() {
  let highestHole = null;
  let bestFront = null;
  let bestBack = null;
  let bestMorrinsvilleBack = null;
  let bestTotal = null;

  allScores.forEach(s => {
    const round = roundForScore(s);
    if (!round) return;
    const hs = holeScores(s);

    HOLES.forEach(h => {
      const val = s['h'+h];
      if (val == null) return;
      if (!highestHole || val > highestHole.score) {
        highestHole = { player: s.player, score: val, hole: h, course: round.course, date: round.date };
      }
    });

    const front = calcOut(hs);
    const back = calcIn(hs);

    if (front > 0 && (!bestFront || front < bestFront.score)) {
      bestFront = { player: s.player, score: front, course: round.course, date: round.date };
    }
    if (back > 0 && (!bestBack || back < bestBack.score)) {
      bestBack = { player: s.player, score: back, course: round.course, date: round.date };
    }
    if (normalizeCourseName(round.course).includes('morrinsville') && back > 0 && (!bestMorrinsvilleBack || back < bestMorrinsvilleBack.score)) {
      bestMorrinsvilleBack = { player: s.player, score: back, course: round.course, date: round.date };
    }
    if (s.total != null && (!bestTotal || s.total < bestTotal.total)) {
      bestTotal = { player: s.player, total: s.total, course: round.course, date: round.date };
    }
  });

  return { highestHole, bestFront, bestBack, bestMorrinsvilleBack, bestTotal };
}

function esc(s){return String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c] || c));}

function getPlayerRoundSeries(player){
  return allRounds.slice().sort((a,b)=>new Date(a.date)-new Date(b.date)).map((round, idx) => {
    const s = allScores.find(x => x.round_id === round.id && x.player === player);
    if (!s || s.total == null) return null;
    return { x: idx + 1, label: formatDateShort(round.date), total: s.total, course: round.course || '' };
  }).filter(Boolean);
}

function buildTrendChartSvg(playerStats){
  const series = PLAYERS.map(player => ({ player, data: getPlayerRoundSeries(player) }));
  const values = series.flatMap(s => s.data.map(p => p.total));
  if (!values.length) return '<div class="chart-note">No round data yet.</div>';
  const w=760,h=320,padL=46,padR=18,padT=16,padB=34;
  const min=Math.min(...values)-1, max=Math.max(...values)+1;
  const count=Math.max(...series.map(s=>s.data.length),1);
  const x=(i)=> padL + ((w-padL-padR) * (count===1?0.5:i/(count-1)));
  const y=(v)=> padT + ((max-v)/(max-min||1))*(h-padT-padB);
  const colors=['var(--g)','var(--g3)','#8ea99a'];
  let grid='';
  for(let i=0;i<5;i++){ const val=min + (max-min)*(i/4); const yy=y(val); grid += `<line x1="${padL}" y1="${yy}" x2="${w-padR}" y2="${yy}" stroke="#e8e3d8" stroke-width="1"/><text x="${padL-8}" y="${yy+4}" text-anchor="end" font-size="10" fill="#9b9588">${Math.round(val)}</text>`; }
  let body='';
  series.forEach((s,si)=>{
    if(!s.data.length) return;
    const pts=s.data.map((p,i)=>`${x(i)},${y(p.total)}`).join(' ');
    body += `<polyline fill="none" stroke="${colors[si]}" stroke-width="3" points="${pts}"/>`;
    s.data.forEach((p,i)=>{ body += `<circle cx="${x(i)}" cy="${y(p.total)}" r="4" fill="${colors[si]}"/><title>${esc(s.player)} · ${esc(p.label)} · ${p.total}</title>`; });
  });
  let xlabels='';
  const longest=series.reduce((a,b)=>a.data.length>=b.data.length?a:b,{data:[]}).data;
  longest.forEach((p,i)=>{ xlabels += `<text x="${x(i)}" y="${h-10}" text-anchor="middle" font-size="10" fill="#9b9588">R${i+1}</text>`; });
  return `<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="Round trend chart">${grid}<line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="#d9d4c9" stroke-width="1"/>${body}${xlabels}</svg>`;
}

function buildHoleAverageChartSvg(stats){
  const vals=stats.holeStats.map(h=>h.avg).filter(v=>v!=null);
  if (!vals.length) return '<div class="chart-note">No hole data yet.</div>';
  const w=520,h=320,padL=28,padR=14,padT=12,padB=34;
  const max=Math.max(...vals)+0.5;
  const bw=(w-padL-padR)/18;
  let grid='';
  for(let i=0;i<4;i++){ const val=max*(i/3); const yy=padT + ((max-val)/(max||1))*(h-padT-padB); grid += `<line x1="${padL}" y1="${yy}" x2="${w-padR}" y2="${yy}" stroke="#e8e3d8" stroke-width="1"/>`; }
  let bars='';
  stats.holeStats.forEach((hs,idx)=>{
    const v=hs.avg||0; const bh=((v)/(max||1))*(h-padT-padB); const xx=padL + idx*bw + 4; const yy=h-padB-bh;
    bars += `<rect x="${xx}" y="${yy}" width="${Math.max(8,bw-8)}" height="${bh}" fill="var(--g)" opacity="${0.55 + ((idx%3)*0.12)}"/><text x="${xx+(Math.max(8,bw-8))/2}" y="${h-10}" text-anchor="middle" font-size="9" fill="#9b9588">${idx+1}</text><title>Hole ${idx+1}: ${v.toFixed(2)}</title>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="Hole averages chart">${grid}<line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="#d9d4c9" stroke-width="1"/>${bars}</svg>`;
}

function renderDashboard() {
  if (!allRounds.length) {
    document.getElementById('dash-content').innerHTML =
      '<div class="wrap"><p style="color:var(--mu);font-style:italic;font-family:Cormorant Garamond,serif;font-size:18px">No rounds yet. Add your first round via the Admin button.</p></div>';
    return;
  }

  const champ = allRounds[0] || null;
  const champWinner = champ ? getWinner(champ.id) : null;
  const champPar = champ && champWinner ? playedParTotal(holeScores(champWinner), getPar(champ.course)) : 72;

  const allTimeWins = {};
  PLAYERS.forEach(p => allTimeWins[p] = 0);

  allRounds.forEach(r => {
    const w = getWinner(r.id);
    if (w) allTimeWins[w.player] = (allTimeWins[w.player] || 0) + 1;
  });

  const currentYear = new Date().getFullYear();
  const seasonRounds = allRounds.filter(r => r.year === currentYear);
  const seasonWins = {};
  PLAYERS.forEach(p => seasonWins[p] = 0);

  seasonRounds.forEach(r => {
    const w = getWinner(r.id);
    if (w) seasonWins[w.player] = (seasonWins[w.player] || 0) + 1;
  });

  const maxSeasonWins = Math.max(...Object.values(seasonWins), 1);

function tick() {
  const d = new Date('2026-12-26T08:00:00+13:00') - new Date();
  if (d <= 0) return;
  const el = id => document.getElementById(id);
  if (el('cd-d')) {
    el('cd-d').textContent = Math.floor(d/86400000);
    el('cd-h').textContent = String(Math.floor((d%86400000)/3600000)).padStart(2,'0');
    el('cd-m').textContent = String(Math.floor((d%3600000)/60000)).padStart(2,'0');
  }
}

function renderRounds() {

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  const i = ['dashboard','rounds','history','analysis'].indexOf(id);
  // Highlight both desktop and drawer buttons matching the active page
  document.querySelectorAll(`.nlinks .nbtn:nth-child(${i+1}), .ndrawer .nbtn:nth-child(${i+1})`)
    .forEach(b => b.classList.add('active'));
  if (id === 'rounds') renderRounds();
  if (id === 'history') renderHistory();
  if (id === 'analysis') renderAnalysis();
}

function toggleCard(c) {
  const was = c.classList.contains('open');
  document.querySelectorAll('.rc').forEach(x => x.classList.remove('open'));

}

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { err.textContent = error.message; err.style.display = 'block'; return; }
  currentUser = data.user;
  updateAdminBtn();
  closeOverlay('admin-overlay');
  openOverlay('round-overlay');
}

// ── ADD ROUND FORM ──
function buildHoleForm() {
  // Label row
  const labelsEl = document.getElementById('labels-row');
  if (!labelsEl) return;
  const labels = [...HOLES.slice(0,9).map(h=>`<div class="hl">${h}</div>`), '<div class="hl sub">Out</div>', ...HOLES.slice(9).map(h=>`<div class="hl">${h}</div>`), '<div class="hl sub">In</div>', '<div class="hl tot2">Tot</div>'];
  labelsEl.innerHTML = labels.join('');

  PLAYERS.forEach(player => {
    const gridEl = document.getElementById(player.toLowerCase()+'-grid');
    if (!gridEl) return;
    let cells = '';
    for (let h = 1; h <= 18; h++) {
      cells += `<input class="form-input hole-input" type="number" id="${player}-h${h}" min="1" max="15" oninput="updateTotals('${player}')">`;
      if (h === 9) cells += `<div class="sub-cell" id="${player}-out">—</div>`;
    }
    cells += `<div class="sub-cell" id="${player}-in">—</div>`;
    cells += `<div class="tot-cell" id="${player}-tot">—</div>`;
    gridEl.innerHTML = cells;
  });
}

function updateTotals(player) {
  let out = 0, inp = 0;
  for (let h=1;h<=9;h++)  { const v=parseInt(document.getElementById(`${player}-h${h}`)?.value)||0; out+=v; }
  for (let h=10;h<=18;h++){ const v=parseInt(document.getElementById(`${player}-h${h}`)?.value)||0; inp+=v; }
  const outEl = document.getElementById(`${player}-out`);
  const inEl  = document.getElementById(`${player}-in`);
  const totEl = document.getElementById(`${player}-tot`);
  if (outEl) outEl.textContent = out || '—';
  if (inEl)  inEl.textContent  = inp || '—';
  if (totEl) totEl.textContent = (out+inp) || '—';
}

async function submitRound() {
  const btn = document.getElementById('submit-round');
  const err = document.getElementById('round-error');
  const suc = document.getElementById('round-success');
  err.style.display = 'none'; suc.style.display = 'none';

  const date   = document.getElementById('f-date').value;
  const course = document.getElementById('f-course').value.trim();
  const type   = document.getElementById('f-type').value;
  const year   = parseInt(document.getElementById('f-year').value);
  const review = document.getElementById('f-review').value.trim();

  if (!date || !course || !year) { err.textContent = 'Please fill in date, course and year.'; err.style.display='block'; return; }

  // Check at least one player has scores
  const hasScores = PLAYERS.some(player =>
    HOLES.some(h => {
      const val = document.getElementById(`${player}-h${h}`)?.value;
      return val !== '' && val != null;
    })
  );
  if (!hasScores) { err.textContent = 'Please enter at least one player\'s scores.'; err.style.display='block'; return; }

  btn.disabled = true; btn.textContent = 'Saving...';

  // Insert round
  const { data: rData, error: rErr } = await sb.from('rounds').insert({ date, course, round_type: type, year, review: review||null }).select().single();
  if (rErr) { err.textContent = rErr.message; err.style.display='block'; btn.disabled=false; btn.textContent='Save Round'; return; }

  // Insert scores
  const scoreRows = PLAYERS.map(player => {
    const row = { round_id: rData.id, player };
    HOLES.forEach(h => { row[`h${h}`] = parseInt(document.getElementById(`${player}-h${h}`)?.value)||null; });
    return row;
  }).filter(row => HOLES.some(h => row[`h${h}`] != null));

  const { error: sErr } = await sb.from('scores').insert(scoreRows);
  if (sErr) { err.textContent = sErr.message; err.style.display='block'; btn.disabled=false; btn.textContent='Save Round'; return; }

  suc.textContent = 'Round saved successfully!';
  suc.style.display = 'block';
  btn.disabled = false; btn.textContent = 'Save Round';

  // Reload data and refresh
  await loadData();
  renderDashboard();
  if (document.getElementById('page-rounds').classList.contains('active')) renderRounds();
  if (document.getElementById('page-history').classList.contains('active')) renderHistory();
  if (document.getElementById('page-analysis').classList.contains('active')) renderAnalysis();

  // Clear form
  setTimeout(() => {
    document.getElementById('f-date').value = '';
    document.getElementById('f-course').value = '';
    document.getElementById('f-review').value = '';
    PLAYERS.forEach(p => { HOLES.forEach(h => { const el = document.getElementById(`${p}-h${h}`); if(el) el.value=''; }); updateTotals(p); });
    suc.style.display = 'none';
    closeOverlay('round-overlay');
  }, 1500);
}
</script>
</body>
</html>
